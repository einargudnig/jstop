<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b9ef7"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bg)"/>
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Chevron > -->
  <polyline points="272,372 412,512 272,652"
            fill="none" stroke="url(#glow)" stroke-width="56"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore _ as a rounded rect -->
  <rect x="480" y="624" width="220" height="56" rx="28" fill="url(#glow2)"/>
</svg>
